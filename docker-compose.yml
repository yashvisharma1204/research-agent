version: "3.9"

services:
  neo4j:
    image: neo4j:5.19
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  agent:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - neo4j
    volumes:
      - ./:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  scheduler:
    build: .
    env_file: .env
    depends_on:
      - neo4j
    command: python -m ingestion.scheduler
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs: